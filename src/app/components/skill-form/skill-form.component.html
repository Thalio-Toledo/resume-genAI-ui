<div class="form-container">
  <h2>Skills</h2>
  <p>Add your professional skills</p>

  <form [formGroup]="skillForm" (ngSubmit)="addSkill()" class="form-section">
    <div class="form-field">
      <label for="name">Skill Name</label>
      <input
        pInputText
        id="name"
        formControlName="name"
        placeholder="e.g., Angular, Python, AWS"
        class="w-full"
      />
      <small class="text-red-500" *ngIf="skillForm.get('name')?.invalid && skillForm.get('name')?.touched">
        Skill name is required
      </small>
    </div>

    <div class="form-field">
      <label for="level">Proficiency Level</label>
      <select
        id="level"
        formControlName="level"
        class="w-full"
      >
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
        <option value="Expert">Expert</option>
      </select>
    </div>

    <p-button label="Add Skill" (click)="addSkill()" [disabled]="skillForm.invalid"/>
  </form>

  <div class="skills-list" *ngIf="skillList.length > 0">
    <h3>Added Skills</h3>
    <div class="skill-item" *ngFor="let skill of skillList; let i = index">
      <div class="skill-info">
        <p><strong>{{ skill.name }}</strong></p>
        <p class="text-gray-600 text-sm">{{ skill.level }}</p>
      </div>
      <p-button icon="pi pi-trash" [text]="true" severity="danger" (click)="removeSkill(skill)"/>
    </div>
  </div>

  <div class="form-actions">
    <p-button label="Skip" (click)="onSkip()"/>
    <p-button label="Save" (click)="onSubmit()"/>
  </div>
</div>
