<p-toast></p-toast>

<div class="registration-container">
  <div class="registration-header">
    <h1>Resume Registration</h1>
    <p>Complete your profile in {{ items.length }} steps</p>
  </div>
  

  @if(loading()){
    <p-progress-spinner ariaLabel="loading" />
    }@else {
        @if(profile()){
          <p-stepper [value]="1">
             <p-step-item [value]="1">
                 <p-step>Profile</p-step>
                 <p-step-panel>
                     <ng-template #content let-activateCallback="activateCallback">
                         <div class="flex flex-col h-48">
                             @if(!loading()){
                                 <app-profile-form
                                    [profile]="profile()"
                                    (profileSaved)="onProfileSaved($event)"
                                 ></app-profile-form>
                             }
                         </div>
                         <div class="py-6">
                             <p-button label="Next" (onClick)="activateCallback(2)" />
                         </div>
                     </ng-template>
                 </p-step-panel>
             </p-step-item>
         
         
             <p-step-item [value]="3">
                 <p-step>Experience</p-step>
                 <p-step-panel>
                     <ng-template #content let-activateCallback="activateCallback">
                         <div class="flex flex-col gap-4">
                                <app-experience-form
                                [experiences]="profile().experiences"
                                (experiencesAdded)="onExperiencesAdded($event)"
                                (experienceRemoved)="deleteExperience($event)">
                                </app-experience-form>
                         </div>
                         <div class="py-6">
                             <p-button label="Back" severity="secondary" (onClick)="activateCallback(2)" />
                             <p-button label="Next" (onClick)="activateCallback(4)" />
                         </div>
                     </ng-template>
                 </p-step-panel>
             </p-step-item>
         
             <p-step-item [value]="4">
                 <p-step>Education</p-step>
                 <p-step-panel>
                     <ng-template #content let-activateCallback="activateCallback">
                         <div class="flex flex-col gap-4">
                            @if(!loading()){
                                <app-education-form
                                    [educations]="profile().educations"
                                    (educationsAdded)="onEducationsAdded($event)"
                                    (educationRemoved)="deleteEducation($event)">
                                </app-education-form>
                            }

                         </div>
                         <div class="py-6">
                             <p-button label="Back" severity="secondary" (onClick)="activateCallback(3)" />
                             <p-button label="Next" (onClick)="activateCallback(5)" />
                         </div>
                     </ng-template>
                 </p-step-panel>
             </p-step-item>
         
             <p-step-item [value]="5">
                 <p-step>Certifications</p-step>
                 <p-step-panel>
                     <ng-template #content let-activateCallback="activateCallback">
                         <div class="flex flex-col gap-4">
                            <app-certification-form
                                [certifications]="profile().certifications"
                                (certificationsAdded)="onCertificationsAdded($event)"
                                (certificationsRemoved)="deleteCertification($event)">
                            </app-certification-form>
                         </div>
                         <div class="py-6">
                             <p-button label="Back" severity="secondary" (onClick)="activateCallback(4)" />
                             <p-button label="Next" (onClick)="activateCallback(6)" />
                         </div>
                     </ng-template>
                 </p-step-panel>
             </p-step-item>
         
             <p-step-item [value]="6">
                 <p-step>Skills</p-step>
                 <p-step-panel>
                     <ng-template #content let-activateCallback="activateCallback">
                         <div class="flex flex-col gap-4">
                             @if(!loading()){
                                 <app-skill-form
                                   [skills]="profile().skills"
                                   (skillsAdded)="onSkillsAdded($event)"
                                   (skillRemoved)="deleteSkill($event)"
                                 ></app-skill-form>
                             }
                         </div>
                         <div class="py-6">
                             <p-button label="Back" severity="secondary" (onClick)="activateCallback(5)" />
                             <p-button label="Next" (onClick)="activateCallback(7)" />
                         </div>
                     </ng-template>
                 </p-step-panel>
             </p-step-item>
         
             <p-step-item [value]="7">
                 <p-step>Projects</p-step>
                 <p-step-panel>
                     <ng-template #content let-activateCallback="activateCallback">
                         <div class="flex flex-col gap-4">

                            <app-project-form
                                [projects]="profile().projects"
                                (projectsAdded)="onProjectsAdded($event)"
                                (projectRemoved)="deleteProject($event)">
                            </app-project-form>
                         </div>
                         <div class="py-6">
                             <p-button label="Back" severity="secondary" (onClick)="activateCallback(6)" />
                             <p-button label="Next" (onClick)="activateCallback(8)" />
                         </div>
                     </ng-template>
                 </p-step-panel>
             </p-step-item>
         
             <p-step-item [value]="8">
                 <p-step>Languages</p-step>
                 <p-step-panel>
                     <ng-template #content let-activateCallback="activateCallback">
                         <div class="flex flex-col gap-4">
                            <app-language-form
                                [languages]="profile().languages"
                                (languagesAdded)="onLanguagesAdded($event)">
                            </app-language-form>
                         </div>
                         <div class="py-6">
                             <p-button label="Back" severity="secondary" (onClick)="activateCallback(7)" />
                             <p-button label="Next" (onClick)="activateCallback(9)" />
                         </div>
                     </ng-template>
                 </p-step-panel>
             </p-step-item>
         
             <p-step-item [value]="9">
                 <p-step>Social Media</p-step>
                 <p-step-panel>
                     <ng-template #content let-activateCallback="activateCallback">
                        <div class="flex flex-col gap-4">
                            <app-social-media-form
                            [socialMedias]="profile().socialMedias"
                            (socialMediasAdded)="onSocialMediasAdded($event)"
                            ></app-social-media-form>
                        </div>
                         <div class="py-6">
                             <p-button label="Back" severity="secondary" (onClick)="activateCallback(8)" />
                         </div>
                     </ng-template>
                 </p-step-panel>
             </p-step-item>
         </p-stepper>
            }

    }
